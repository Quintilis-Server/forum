name: Build and Push

on:
    push:
        branches: [main, master]
    workflow_dispatch:

env:
    REGISTRY: ghcr.io
    IMAGE_NAME: ghcr.io/quintilis-server/forum
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
    build-and-push:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
        
        steps:
            - name: Checkout forum
              uses: actions/checkout@v4
              with:
                  path: forum
            
            - name: Checkout common
              uses: actions/checkout@v4
              with:
                  repository: Quintilis-Server/common
                  path: common
                  token: ${{ secrets.GITHUB_TOKEN }}
            
            - name: Login no GHCR
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}
            - name: Set up QEMU
              uses: docker/setup-qemu-action@v3
            
            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3
              
            - name: Build e Push
              uses: docker/build-push-action@v5
              with:
                  context: .
                  push: true
                  file: forum/Dockerfile
                  platforms: linux/amd64,linux/arm64
                  tags: |
                      ghcr.io/quintilis-server/forum:latest
                      ghcr.io/quintilis-server/forum:${{ github.sha }}
